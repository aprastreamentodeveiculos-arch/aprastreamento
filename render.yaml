services:
  # ──────────────────────────────────────────
  # BACKEND — Web Service (Node.js) no Render
  # Frontend: Vercel (repositório separado ou mesmo repo / subdiretório)
  # ──────────────────────────────────────────
  - type: web
    name: aprastreamento-api
    runtime: node
    rootDir: backend
    buildCommand: NODE_ENV=development npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false   # colar a string do MongoDB Atlas no painel do Render
      - key: FRONTEND_URL
        sync: false   # colar a URL do Vercel após deploy, ex: https://aprastreamento.vercel.app
